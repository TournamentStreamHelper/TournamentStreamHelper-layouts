<html>
  <head>
    <meta charset="utf-8" />
    <script src="../include/globals.js"></script>
    <link rel="stylesheet" href="../main.css" />
    <link rel="stylesheet" href="./index.css" />
    <style>
      /* spread players apart to leave room for the in-game timer */
      .scoreboard_container {
        gap: 140px;
        top: 25px;
      }

      .info_container {
        top: 25px;
      }

      /* logo moves to top right */
      .middle_logo {
        left: unset;
        position: absolute;
        right: 15px;
        top: 25px;
      }
    </style>
  </head>
  <body>
    <div class="info_container">
      <div class="parrygg_logo"></div>
      <div class="info">
        <div class="tournament_name"></div>
        <div class="divider"></div>
        <div class="match_container">
          <div class="match"></div>
          <div class="best_of"></div>
        </div>
      </div>
    </div>

    <div class="middle_logo fade"></div>

    <div class="scoreboard_container">
      <div class="p1 player container">
        <div class="character_bg"></div>
        <div class="player-info">
          <div class="top-row">
            <div class="pronoun"></div>
            <div class="twitter"></div>
            <div class="seed"></div>
          </div>
          <div class="bottom-row">
            <div class="name"></div>
          </div>
        </div>
        <div class="score"></div>
      </div>

      <div class="p2 player container">
        <div class="character_bg"></div>
        <div class="score"></div>
        <div class="player-info">
          <div class="top-row">
            <div class="seed"></div>
            <div class="twitter"></div>
            <div class="pronoun"></div>
          </div>
          <div class="bottom-row">
            <div class="name"></div>
          </div>
        </div>
      </div>
    </div>

    <script src="index.js"></script>
  </body>
</html>
