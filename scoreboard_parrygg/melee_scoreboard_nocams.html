<html>
  <head>
    <meta charset="utf-8" />
    <script src="../include/globals.js"></script>
    <link rel="stylesheet" href="../main.css" />
    <link rel="stylesheet" href="./melee.css" />
    <style>
      .bottom_right_square {
        height: 100%;
        justify-content: center;
      }
      .logo {
        margin-top: unset;
      }
    </style>
  </head>
  <body>
    <div class="gameview"></div>

    <div class="bottom_right_square">
      <div class="info_container">
        <div class="parrygg_logo"></div>
        <div class="info">
          <div class="tournament_name"></div>
          <div class="divider"></div>
          <div class="match_container">
            <div class="match"></div>
            <div class="best_of"></div>
          </div>
        </div>
      </div>

      <div class="p1 player container">
        <div class="score"></div>
        <div class="name"></div>
        <div class="top-row">
          <div class="seed"></div>
          <div class="twitter"></div>
          <div class="pronoun"></div>
        </div>
        <div class="character_bg"></div>
      </div>

      <div class="p2 player container">
        <div class="score"></div>
        <div class="name"></div>
        <div class="top-row">
          <div class="seed"></div>
          <div class="twitter"></div>
          <div class="pronoun"></div>
        </div>
        <div class="character_bg"></div>
      </div>

      <div class="logo fade"></div>
    </div>

    <script src="index.js"></script>
  </body>
</html>
