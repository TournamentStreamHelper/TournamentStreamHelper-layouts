<html>
  <head>
    <meta charset="utf-8" />
    <script src="../include/globals.js"></script>
    <link rel="stylesheet" href="../main.css" />
    <link rel="stylesheet" href="./index.css" />
  </head>
  <body>
    <div id="header" class="fade">
      <div class="info_container">
        <img class="tournament_logo" src="../logo.png" />
        <div class="info">
          <div class="tournament_name"></div>
          <div class="event_name"></div>
        </div>
      </div>
    </div>

    <div id="teams">
      <div class="team t1">
        <div class="players_area"></div>
      </div>

      <div id="center_strip" class="fade">
        <div id="stage_list"></div>
      </div>

      <div class="team t2">
        <div class="players_area"></div>
      </div>
    </div>

    <div id="score_bar">
      <div class="score_side t1 fade">
        <img class="team_logo" />
        <div class="team_identity">
          <div class="score_team_name"></div>
          <span class="losers_badge">L</span>
        </div>
        <div class="score"></div>
      </div>
      <div class="center_area fade">
        <div class="ca_phase"></div>
        <div class="ca_match"></div>
        <div class="ca_best_of"></div>
      </div>
      <div class="score_side t2 fade">
        <div class="score"></div>
        <div class="team_identity">
          <div class="score_team_name"></div>
          <span class="losers_badge">L</span>
        </div>
        <img class="team_logo" />
      </div>
    </div>

    <script src="index.js"></script>
  </body>
</html>
