<html>
  <head>
    <meta charset="utf-8" />
    <script src="../include/globals.js"></script>
    <link rel="stylesheet" href="../main.css" />
    <link rel="stylesheet" href="./index.css" />
  </head>
  <body class="ssbu">
    <script>if (window.parent !== window) { document.addEventListener('DOMContentLoaded', () => { document.querySelector('.info_header').style.display = 'none'; }); }</script>
    <div class="logo fade"></div>

    <div class="info_header fade">
      <div class="tournament_name"></div>
      <div class="event_name"></div>
    </div>
    <div class="info bottom container fade">
      <div class="match"></div>
      <div class="phase"></div>
    </div>

    <div class="anim_container_outer">
      <div class="anim_container_inner">

        <div class="p1 player container fade_right">
          <div class="icon avatar"></div>
          <div class="icon online_avatar"></div>
          <div class="sponsor_icon"></div>
          <div class="name"></div>
          <div class="character_container"></div>
          <div class="score"></div>
        </div>
        <div class="p1 chips">
          <div class="seed chip fade_right_stagger"></div>
          <div class="twitter chip fade_right_stagger"></div>
          <div class="pronoun chip fade_right_stagger"></div>
          <div class="flagstate chip fade_right_stagger"></div>
          <div class="flagcountry chip fade_right_stagger"></div>
        </div>
        <div class="p2 player container fade_left">
          <div class="icon avatar"></div>
          <div class="icon online_avatar"></div>
          <div class="sponsor_icon"></div>
          <div class="name"></div>
          <div class="character_container"></div>
          <div class="score"></div>
        </div>
        <div class="p2 chips">
          <div class="seed chip fade_right_stagger2"></div>
          <div class="twitter chip fade_right_stagger2"></div>
          <div class="pronoun chip fade_right_stagger2"></div>
          <div class="flagstate chip fade_right_stagger2"></div>
          <div class="flagcountry chip fade_right_stagger2"></div>
        </div>
      </div>
    </div>

    <script src="index.js"></script>
  </body>
</html>
