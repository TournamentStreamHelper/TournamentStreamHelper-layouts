<html>
  <head>
    <meta charset="utf-8" />
    <script src="../include/globals.js"></script>
    <link rel="stylesheet" href="../main.css" />
    <link rel="stylesheet" href="./index.css" />
  </head>
  <body>
    <div class="gameview"></div>

    <div class="bottom_right_square">
      <div class="playercam"></div>

      <div class="info_container">
        <div class="info">
          <div class="tournament_name"></div>
          <div class="match"></div>
          <div class="phase"></div>
        </div>
      </div>

      <div class="p1 player container">
        <div class="score"></div>
        <div class="name">
          <div class="team_name"></div>
          <div class="team_members"></div>
        </div>
        <div class="sponsor_icon"></div>
        <div class="top-row">
          <div class="seed"></div>
          <div class="twitter"></div>
          <div class="pronoun"></div>
          <div class="location"></div>
        </div>
        <div class="character_bg">
        </div>
      </div>

      <div class="p2 player container">
        <div class="score"></div>
        <div class="name">
          <div class="team_name"></div>
          <div class="team_members"></div>
        </div>
        <div class="sponsor_icon"></div>
        <div class="top-row">
          <div class="seed"></div>
          <div class="twitter"></div>
          <div class="pronoun"></div>
          <div class="location"></div>
        </div>
        <div class="character_bg">
        </div>
      </div>

      <div class="logo fade"></div>
    </div>

    <script src="index.js"></script>
  </body>
</html>
